<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Configurable Maze Game</title>

<style>
    body {
        margin: 0;
        background: #e8e8e8;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    canvas {
        background: #f5f5f5;
        border: 4px solid #222;
        box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .info {
        position: absolute;
        top: 10px;
        left: 10px;
        background: white;
        padding: 10px 14px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.15);
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="info">
    🎮 Arrow Keys / WASD to move<br>
    🟢 Reach the red exit!
</div>

<canvas id="game"></canvas>

<script>
// =====================================================
// EASY MAZE CONFIGURATION
// =====================================================

// Canvas size
const WIDTH = 900;
const HEIGHT = 900;

// Player settings
const PLAYER = {
    x: 50,
    y: 300,
    size: 18,
    speed: 4,
    color: "purple"
};

// Exit area
const EXIT = {
    x: 850,
    y: 650,
    width: 30,
    height: 80,
    color: "red"
};

// Wall thickness
const WALL_THICKNESS = 16;

// MAZE WALLS
// Format:
// [x, y, width, height]
//
// Super easy to edit 👀
// Just add/remove rectangles.
//
const walls = [

    // Outer border
    [100,100,700,WALL_THICKNESS],
    [100,100,WALL_THICKNESS,100],
	[100,200,WALL_THICKNESS,700],
    [100,800,700,WALL_THICKNESS],
    [800,100,WALL_THICKNESS,550],
    [800,720,WALL_THICKNESS,96],

    // Entrance gap already exists naturally

    // Inner walls
    [250,250,400,WALL_THICKNESS],
    [450,100,WALL_THICKNESS,150],

    [650,250,WALL_THICKNESS,300],

    [250,400,300,WALL_THICKNESS],
    [250,400,WALL_THICKNESS,250],

    [400,550,400,WALL_THICKNESS],

    [250,650,300,WALL_THICKNESS],
    [520,650,WALL_THICKNESS,166]
];

// =====================================================
// GAME SETUP
// =====================================================

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = WIDTH;
canvas.height = HEIGHT;

const keys = {};

// =====================================================
// INPUT
// =====================================================

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

// =====================================================
// COLLISION
// =====================================================

function rectsCollide(a, b) {
    return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
    );
}

function touchingWall(nextX, nextY) {

    const playerRect = {
        x: nextX,
        y: nextY,
        width: PLAYER.size,
        height: PLAYER.size
    };

    for (const wall of walls) {

        const wallRect = {
            x: wall[0],
            y: wall[1],
            width: wall[2],
            height: wall[3]
        };

        if (rectsCollide(playerRect, wallRect)) {
            return true;
        }
    }

    return false;
}

// =====================================================
// UPDATE
// =====================================================

function update() {

    let dx = 0;
    let dy = 0;

    if (keys["arrowup"] || keys["w"]) dy -= PLAYER.speed;
    if (keys["arrowdown"] || keys["s"]) dy += PLAYER.speed;
    if (keys["arrowleft"] || keys["a"]) dx -= PLAYER.speed;
    if (keys["arrowright"] || keys["d"]) dx += PLAYER.speed;

    // Horizontal movement
    if (!touchingWall(PLAYER.x + dx, PLAYER.y)) {
        PLAYER.x += dx;
    }

    // Vertical movement
    if (!touchingWall(PLAYER.x, PLAYER.y + dy)) {
        PLAYER.y += dy;
    }

    // Win detection
    const playerRect = {
        x: PLAYER.x,
        y: PLAYER.y,
        width: PLAYER.size,
        height: PLAYER.size
    };

    if (rectsCollide(playerRect, EXIT)) {
        setTimeout(() => {
            alert("🎉 YOU ESCAPED THE MAZE!");
            PLAYER.x = 50;
            PLAYER.y = 300;
        }, 50);
    }
}

// =====================================================
// DRAW
// =====================================================

function draw() {

    ctx.clearRect(0,0,WIDTH,HEIGHT);

    // Background
    ctx.fillStyle = "#efefef";
    ctx.fillRect(0,0,WIDTH,HEIGHT);

    // Draw walls
    ctx.fillStyle = "black";

    for (const wall of walls) {
        ctx.fillRect(
            wall[0],
            wall[1],
            wall[2],
            wall[3]
        );
    }

    // Entrance arrow
    ctx.fillStyle = "green";
    ctx.beginPath();
    ctx.moveTo(20,300);
    ctx.lineTo(60,300);
    ctx.lineTo(60,280);
    ctx.lineTo(90,320);
    ctx.lineTo(60,360);
    ctx.lineTo(60,340);
    ctx.lineTo(20,340);
    ctx.closePath();
    ctx.fill();

    // Exit arrow
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.moveTo(880,650);
    ctx.lineTo(840,650);
    ctx.lineTo(840,630);
    ctx.lineTo(810,670);
    ctx.lineTo(840,710);
    ctx.lineTo(840,690);
    ctx.lineTo(880,690);
    ctx.closePath();
    ctx.fill();

    // Exit zone
    ctx.fillStyle = "rgba(255,0,0,0.2)";
    ctx.fillRect(EXIT.x, EXIT.y, EXIT.width, EXIT.height);

    // Player
    ctx.fillStyle = PLAYER.color;
    ctx.fillRect(
        PLAYER.x,
        PLAYER.y,
        PLAYER.size,
        PLAYER.size
    );
}

// =====================================================
// GAME LOOP
// =====================================================

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>
</body>
</html>
